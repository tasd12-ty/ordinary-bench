# ORDINARY-BENCH GRPO + 全参数微调配置
# 用法: bash training/run_grpo.sh --mode full --model Qwen/Qwen3-VL-32B
#
# 适用于 8×A100 80GB (FSDP 分片，显存较紧)
# 如果 OOM，减小 train_batch_size 或 rollout.n

algorithm:
  adv_estimator: grpo

data:
  train_files: ${TRAIN_FILE:-VLM-test/verl_data/train.parquet}
  val_files: ${VAL_FILE:-VLM-test/verl_data/test.parquet}
  train_batch_size: 256
  max_prompt_length: 2048
  max_response_length: 256
  filter_overlong_prompts: true
  image_key: images

actor_rollout_ref:
  model:
    path: ${MODEL_PATH:-Qwen/Qwen3-VL-32B}

  actor:
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    ppo_mini_batch_size: 128
    ppo_micro_batch_size_per_gpu: 1
    clip_ratio: 0.2
    loss_agg_mode: token-mean

  rollout:
    n: 5
    temperature: 0.7
    top_p: 0.95
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.8
    calculate_log_probs: true

  ref:
    log_prob_micro_batch_size_per_gpu: 1

custom_reward_function:
  path: ${REWARD_PATH:-VLM-test/verl_reward.py}
  name: compute_score

trainer:
  total_epochs: 10
  save_frequency: 50
  val_frequency: 50
  val_before_train: true
  save_total_limit: 3
  resume_mode: auto
  project_name: ordinary-bench-grpo
  experiment_name: grpo-full
  logger: ['console', 'wandb']
  n_gpus_per_node: ${N_GPUS:-8}

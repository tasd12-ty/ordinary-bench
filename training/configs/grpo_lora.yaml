# ORDINARY-BENCH GRPO + LoRA 训练配置
# 用法: bash training/run_grpo.sh --mode lora --model Qwen/Qwen3-VL-32B
#
# GRPO: 每个 prompt 生成 n 个回答，用 reward 做组内相对排序
# 适用于 8×A100 80GB

algorithm:
  adv_estimator: grpo

data:
  train_files: ${TRAIN_FILE:-VLM-test/verl_data/train.parquet}
  val_files: ${VAL_FILE:-VLM-test/verl_data/test.parquet}
  train_batch_size: 512
  max_prompt_length: 2048
  max_response_length: 256
  filter_overlong_prompts: true
  image_key: images

actor_rollout_ref:
  model:
    path: ${MODEL_PATH:-Qwen/Qwen3-VL-32B}
    lora_rank: 64
    lora_alpha: 32
    target_modules: "q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj"

  actor:
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    ppo_mini_batch_size: 256
    ppo_micro_batch_size_per_gpu: 2
    clip_ratio: 0.2
    loss_agg_mode: token-mean

  rollout:
    n: 5
    temperature: 0.7
    top_p: 0.95
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.7
    calculate_log_probs: true

  ref:
    log_prob_micro_batch_size_per_gpu: 2

custom_reward_function:
  path: ${REWARD_PATH:-VLM-test/verl_reward.py}
  name: compute_score

trainer:
  total_epochs: 10
  save_frequency: 50
  val_frequency: 50
  val_before_train: true
  save_total_limit: 3
  resume_mode: auto
  project_name: ordinary-bench-grpo
  experiment_name: grpo-lora
  logger: ['console', 'wandb']
  n_gpus_per_node: ${N_GPUS:-8}

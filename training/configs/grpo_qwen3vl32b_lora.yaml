# Qwen3-VL-32B + verl v0.6.1 推荐 GRPO-LoRA 配置
# 目标: 8 x A100/H100 80GB 级别环境

algorithm:
  adv_estimator: grpo

data:
  train_files: ${TRAIN_FILE:-VLM-test/verl_data_qwen3vl32b/train.parquet}
  val_files: ${VAL_FILE:-VLM-test/verl_data_qwen3vl32b/test.parquet}
  prompt_key: prompt
  image_key: images
  reward_model_key: reward_model
  train_batch_size: 128
  max_prompt_length: 1536
  max_response_length: 128
  truncation: error
  filter_overlong_prompts: true

actor_rollout_ref:
  model:
    path: ${MODEL_PATH:-Qwen/Qwen3-VL-32B}
    trust_remote_code: true
    use_remove_padding: false
    enable_gradient_checkpointing: true
    lora_rank: 32
    lora_alpha: 64
    target_modules: all-linear
    exclude_modules: ".*visual.*"

  actor:
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 1
    clip_ratio: 0.2
    loss_agg_mode: token-mean

  rollout:
    name: vllm
    n: 4
    temperature: 0.7
    top_p: 0.95
    tensor_model_parallel_size: 4
    gpu_memory_utilization: 0.85
    calculate_log_probs: true

  ref:
    log_prob_micro_batch_size_per_gpu: 1

custom_reward_function:
  path: ${REWARD_PATH:-VLM-test/verl_reward.py}
  name: compute_score

trainer:
  total_epochs: 5
  save_freq: 50
  test_freq: 50
  val_before_train: true
  resume_mode: auto
  project_name: ordinary-bench-qwen3vl32b
  experiment_name: grpo-lora
  logger: ['console']
  n_gpus_per_node: ${N_GPUS:-8}

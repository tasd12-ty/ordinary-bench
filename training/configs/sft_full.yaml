# ORDINARY-BENCH SFT + 全参数微调配置
# 用法: bash training/run_sft.sh --mode full --model Qwen/Qwen3-VL-32B
#
# 适用于 8×A100 80GB (FSDP 分片)

model:
  path: ${MODEL_PATH:-Qwen/Qwen3-VL-32B}
  use_liger: true

data:
  train_files: ${TRAIN_FILE:-VLM-test/verl_data_sft/train.parquet}
  val_files: ${VAL_FILE:-VLM-test/verl_data_sft/test.parquet}
  prompt_key: prompt
  response_key: response
  image_key: images
  max_prompt_length: 2048
  max_response_length: 512
  train_batch_size: 64

trainer:
  total_epochs: 3
  save_frequency: 200
  val_frequency: 200
  save_total_limit: 3
  project_name: ordinary-bench-sft
  experiment_name: sft-full
  logger: ['console', 'wandb']
  n_gpus_per_node: ${N_GPUS:-8}

optim:
  lr: 5e-6
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  micro_batch_size_per_gpu: 1

# ORDINARY-BENCH SFT + LoRA 训练配置
# 用法: bash training/run_sft.sh --mode lora --model Qwen/Qwen3-VL-32B
#
# 适用于 8×A100 80GB

model:
  path: ${MODEL_PATH:-Qwen/Qwen3-VL-32B}
  use_liger: true
  lora_rank: 64
  lora_alpha: 32
  target_modules: "q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj"

data:
  train_files: ${TRAIN_FILE:-VLM-test/verl_data_sft/train.parquet}
  val_files: ${VAL_FILE:-VLM-test/verl_data_sft/test.parquet}
  prompt_key: prompt
  response_key: response
  image_key: images
  max_prompt_length: 2048
  max_response_length: 512
  train_batch_size: 128

trainer:
  total_epochs: 3
  save_frequency: 200
  val_frequency: 200
  save_total_limit: 3
  project_name: ordinary-bench-sft
  experiment_name: sft-lora
  logger: ['console', 'wandb']
  n_gpus_per_node: ${N_GPUS:-8}

optim:
  lr: 2e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  micro_batch_size_per_gpu: 4
